name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  # Required for npm Trusted Publishing (OIDC) — no NPM_TOKEN secret needed.
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - run: git fetch --tags --force

      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck
      - run: bun run build

      - name: Calculate next version
        id: semver
        run: |
          # Get latest semver tag (v-prefixed only)
          LATEST_TAG=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)

          if [ -z "$LATEST_TAG" ]; then
            echo "No version tag found, creating initial v1.0.0"
            echo "next=v1.0.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Get commits since last tag
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || true)

          BUMP="none"
          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            if echo "$msg" | grep -qE '^(feat|feature):'; then
              [ "$BUMP" = "none" ] && BUMP="minor"
            elif echo "$msg" | grep -qiE '^BREAKING CHANGE'; then
              BUMP="major"
            elif echo "$msg" | grep -qE '^(build|chore|ci|docs|fix|perf|refactor|revert|style|test):'; then
              [ "$BUMP" = "none" ] && BUMP="patch"
            fi
          done <<< "$COMMITS"

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor)
              MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch)
              PATCH=$((PATCH + 1)) ;;
            *)
              echo "No version bump needed"
              echo "next=" >> "$GITHUB_OUTPUT"
              exit 0 ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "Current: $CURRENT -> Next: $NEXT (bump: $BUMP)"
          echo "next=v$NEXT" >> "$GITHUB_OUTPUT"

      # The dist commit is intentionally NOT pushed to master: it is reachable
      # only through the release tags, so master stays free of build artifacts.
      # Users install via `github:gchamon/opencode-kiro-auth#v1` (or a pinned tag).
      - name: Commit dist and push tag
        if: steps.semver.outputs.next
        run: |
          TAG="${{ steps.semver.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          git commit -m "build: dist for ${TAG}" || true
          git tag "$TAG"
          git push origin "$TAG"
          git tag -f v1 "$TAG"
          git push origin v1 --force

      - name: Create GitHub Release
        if: steps.semver.outputs.next
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.next }}
          generate_release_notes: true
          make_latest: true

      # Determine the version that should be on npm right now. This is
      # intentionally independent of steps.semver.outputs.next (which is only
      # set when a *new* bump was just computed) so that re-running this
      # workflow after a transient publish failure — or running it manually
      # via workflow_dispatch — still finds and publishes the correct
      # version, whether or not "Commit dist and push tag" ran this time.
      - name: Determine publish version
        id: publish_version
        run: |
          git fetch --tags --force
          LATEST_TAG=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
          if [ -n "$LATEST_TAG" ]; then
            VERSION="${LATEST_TAG#v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "Target publish version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Idempotency check: skip publishing if npm already has this version,
      # so retries/manual re-runs never fail on a duplicate-version error.
      - name: Check npm registry
        id: npm_check
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          VERSION="${{ steps.publish_version.outputs.version }}"
          PUBLISHED=$(npm view "$PKG_NAME@$VERSION" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "$PKG_NAME@$VERSION is already on npm, skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "$PKG_NAME@$VERSION not found on npm, will publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      # Publishes via npm Trusted Publishing (OIDC): configure the trusted
      # publisher on npmjs.com (package settings -> Trusted Publisher ->
      # GitHub Actions, repo gchamon/opencode-kiro-auth, workflow release.yml).
      # Trusted publishing requires npm >= 11.5.1, hence the self-upgrade.
      - name: Publish to npm
        if: steps.npm_check.outputs.should_publish == 'true'
        run: |
          npm install -g npm@latest
          npm pkg set version="${{ steps.publish_version.outputs.version }}"
          npm publish --ignore-scripts
